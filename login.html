<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to MemoryLens — Manage profiles and access the live face recognition demo.">
  <title>MemoryLens — Sign In</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 2rem;
    }

    .login-glow {
      position: absolute;
      top: 40%;
      left: 50%;
      width: 800px;
      height: 800px;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(133, 173, 255, 0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    .login-card {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 420px;
      padding: 3rem 2.5rem;
      opacity: 0;
      transform: scale(0.96);
    }

    .login-card .logo {
      justify-content: center;
      margin-bottom: 2.5rem;
    }

    .login-card .logo .logo-icon {
      width: 28px;
      height: 28px;
    }

    .login-card .logo .logo-wordmark {
      font-size: 1.4rem;
    }

    /* Toggle */
    .auth-toggle {
      display: flex;
      background: rgba(14, 14, 16, 0.5);
      border-radius: var(--radius-pill);
      padding: 4px;
      margin-bottom: 2rem;
    }

    .auth-toggle button {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: var(--radius-pill);
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text-secondary);
      transition: all 0.35s ease;
    }

    .auth-toggle button.active {
      background: linear-gradient(135deg, var(--primary), var(--primary-end));
      color: var(--bg-base);
      font-weight: 600;
    }

    /* Inputs */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group label {
      display: block;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .form-group input {
      width: 100%;
      padding: 0.875rem 1.25rem;
      background: rgba(14, 14, 16, 0.6);
      border: 1px solid transparent;
      border-radius: var(--radius-card);
      color: var(--text-primary);
      font-size: 1rem;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .form-group input::placeholder {
      color: rgba(172, 170, 173, 0.4);
    }

    .form-group input:focus {
      border-color: rgba(133, 173, 255, 0.3);
      box-shadow: var(--focus-glow);
    }

    /* Name field (sign up only) */
    .name-field {
      display: none;
    }

    .name-field.visible {
      display: block;
    }

    /* Submit */
    .login-submit {
      width: 100%;
      margin-top: 0.5rem;
      justify-content: center;
    }

    /* Google */
    .google-btn {
      width: 100%;
      margin-top: 1rem;
      justify-content: center;
      font-size: 0.9rem;
    }

    .divider-text {
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin: 1.25rem 0;
      opacity: 0.6;
    }

    /* Fine print */
    .fine-print {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 2rem;
      line-height: 1.5;
      opacity: 0.6;
    }

    .fine-print i {
      width: 12px;
      height: 12px;
      vertical-align: -1px;
      margin-right: 4px;
    }
  </style>
</head>
<body>

  <div class="login-page">
    <div class="login-glow"></div>

    <div class="login-card glass" id="login-card">
      <div class="logo">
        <i data-feather="eye" class="logo-icon"></i>
        <span class="logo-wordmark">MemoryLens</span>
      </div>

      <div class="auth-toggle" id="auth-toggle">
        <button class="active" data-mode="signin">Sign In</button>
        <button data-mode="signup">Sign Up</button>
      </div>

      <form id="auth-form" onsubmit="handleAuth(event)">
        <div class="form-group name-field" id="name-field">
          <label for="name-input">Full Name</label>
          <input type="text" id="name-input" placeholder="Jane Doe" autocomplete="name">
        </div>

        <div class="form-group">
          <label for="email-input">Email</label>
          <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email" required>
        </div>

        <div class="form-group">
          <label for="password-input">Password</label>
          <input type="password" id="password-input" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn-primary login-submit">Continue</button>
      </form>

      <div class="divider-text">or</div>

      <button class="btn-secondary google-btn">
        <i data-feather="chrome" style="width:18px;height:18px;"></i>
        Sign in with Google
      </button>

      <p class="fine-print">
        <i data-feather="shield"></i>
        Your data never leaves your device. All profiles stored locally.
      </p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://unpkg.com/feather-icons/dist/feather.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

  <script>
    feather.replace({ 'stroke-width': 1.5 });

    // Card entrance animation
    gsap.to('#login-card', {
      opacity: 1,
      scale: 1,
      duration: 0.8,
      ease: 'power3.out',
      delay: 0.2
    });

    // Toggle logic
    const toggleBtns = document.querySelectorAll('.auth-toggle button');
    const nameField = document.getElementById('name-field');

    toggleBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        toggleBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        if (btn.dataset.mode === 'signup') {
          nameField.classList.add('visible');
        } else {
          nameField.classList.remove('visible');
        }
      });
    });

    function handleAuth(e) {
      e.preventDefault();
      // Navigate to dashboard
      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
